<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemilihan Kokurikulum Permainan | MPU4321 OGOS-DIS 2026</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f4f4f0;
            color: #111;
            background-image: radial-gradient(#d5d5d0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .font-oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .neo-border { border: 4px solid #000; }
        .neo-shadow { box-shadow: 6px 6px 0px #000; transition: all 0.2s ease; }
        .neo-shadow:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #000; }
        .neo-shadow-active:active { transform: translate(6px, 6px) !important; box-shadow: 0px 0px 0px #000 !important; }
        .neo-input { border: 4px solid #000; box-shadow: 4px 4px 0px #000; transition: all 0.2s ease; }
        .neo-input:focus { outline: none; box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }

        .marquee-container { overflow: hidden; white-space: nowrap; border-bottom: 4px solid black; border-top: 4px solid black; background-color: #ccff00; }
        .marquee-content { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .radio-custom:checked + div { background-color: #000; color: #fff; transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        .radio-custom:disabled + div { opacity: 0.5; background-color: #e5e7eb; color: #9ca3af; border-color: #9ca3af; box-shadow: none; cursor: not-allowed; transform: none; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <div class="marquee-container py-2 text-xl font-oswald font-bold tracking-widest text-black z-50 relative">
        <div class="marquee-content">
            PEMILIHAN SUKAN 2026 /// PILIH SUKAN ANDA /// BERTINDAK SEGERA /// KUOTA TERHAD /// PEMILIHAN SUKAN 2026 /// PILIH SUKAN ANDA /// BERTINDAK SEGERA /// KUOTA TERHAD ///
        </div>
    </div>

    <div id="root" class="flex-grow flex flex-col relative"></div>

    <script type="text/babel">
        // ---> Sila letakkan URL Web App anda di bawah ini:
        const API_URL = "https://script.google.com/macros/s/AKfycbz-72ijRhwX10Gr1k8SbdH7UNvsEqZeIzuki16o68yBoNTylEN-GWPJa6GxhMJwF1hI-A/exec";

        // Fungsi convert link Google Drive
        const getDirectImageUrl = (url) => {
            if (!url) return null;
            let fileId = '';
            try {
                if (url.includes('id=')) {
                    fileId = url.split('id=')[1].split('&')[0];
                } else if (url.includes('/d/')) {
                    fileId = url.split('/d/')[1].split('/')[0];
                }
                if (fileId) {
                    return `https://drive.google.com/uc?export=view&id=${fileId}`;
                }
            } catch (e) {
                console.error("Gagal format imej", e);
            }
            return url; 
        };

        const App = () => {
            const [view, setView] = React.useState('login'); 
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            
            const [noKp, setNoKp] = React.useState('');
            const [student, setStudent] = React.useState(null);
            
            const [sports, setSports] = React.useState([]);
            const [pilihan1, setPilihan1] = React.useState('');
            const [pilihan2, setPilihan2] = React.useState('');
            const [pilihan3, setPilihan3] = React.useState('');

            // State untuk Dashboard Ahli Pasukan
            const [viewMembersSport, setViewMembersSport] = React.useState(null);
            const [membersList, setMembersList] = React.useState([]);
            const [loadingMembers, setLoadingMembers] = React.useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!noKp) return;
                setLoading(true); setError('');
                try {
                    const res = await fetch(`${API_URL}?action=login&no_kp=${noKp}`, { redirect: 'follow' });
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        setStudent(data.data);
                        if (data.data.isCompleted) {
                            setPilihan1(data.data.pilihan1);
                            setPilihan2(data.data.pilihan2);
                            setPilihan3(data.data.pilihan3);
                            setView('dashboard_pelajar');
                        } else {
                            fetchSports(data.data.jantina); 
                        }
                    } else {
                        setError(data.message);
                        setLoading(false);
                    }
                } catch (err) {
                    setError("Ralat sambungan ke pelayan.");
                    setLoading(false);
                }
            };

            const fetchSports = async (jantina) => {
                try {
                    const res = await fetch(`${API_URL}?action=getSports&jantina=${jantina}`, { redirect: 'follow' });
                    const data = await res.json();
                    if (data.status === 'success') {
                        setSports(data.data);
                        setView('selection');
                    } else {
                        setError("Gagal memuat turun senarai sukan.");
                    }
                } catch (err) {
                    setError("Ralat semasa mengambil senarai sukan.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmit = async () => {
                if (!pilihan1 || !pilihan2 || !pilihan3) {
                    setError("Sila lengkapkan ketiga-tiga pilihan sukan anda.");
                    return;
                }
                setLoading(true); setError('');
                
                try {
                    const payload = {
                        no_kp: student.no_kp,
                        pilihan1: pilihan1, pilihan2: pilihan2, pilihan3: pilihan3
                    };

                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        redirect: 'follow',
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        setView('dashboard_pelajar'); // Hantar ke dashboard lepas siap
                    } else if (data.code === 'QUOTA_FULL') {
                        setError(data.message);
                        setPilihan1(''); 
                        fetchSports(student.jantina); 
                    } else {
                        setError(data.message);
                        setLoading(false);
                    }
                } catch (err) {
                    setError("Gagal menghantar data.");
                    setLoading(false);
                }
            };

            const handleReset = () => {
                setPilihan1('');
                setPilihan2('');
                setPilihan3('');
                setError('');
            };

            const fetchMembers = async (sportName) => {
                setLoadingMembers(true);
                setViewMembersSport(sportName);
                try {
                    const res = await fetch(`${API_URL}?action=getMembers&sukan=${encodeURIComponent(sportName)}`, { redirect: 'follow' });
                    const data = await res.json();
                    if (data.status === 'success') {
                        setMembersList(data.data);
                    } else {
                        alert("Gagal mengambil senarai nama.");
                    }
                } catch (err) {
                    alert("Ralat sambungan.");
                } finally {
                    setLoadingMembers(false);
                }
            };
            
            const closeMembersModal = () => {
                setViewMembersSport(null);
                setMembersList([]);
            };

            const isSelectedElseWhere = (sportName, currentChoice) => {
                if (currentChoice !== 1 && pilihan1 === sportName) return true;
                if (currentChoice !== 2 && pilihan2 === sportName) return true;
                if (currentChoice !== 3 && pilihan3 === sportName) return true;
                return false;
            };

            const CopyrightFooter = () => (
                <div className="w-full text-center py-4 mt-8">
                    <p className="font-oswald text-[11px] sm:text-xs font-bold tracking-widest text-black uppercase opacity-60 px-4">
                        Hakmilik Unit Kokurikulum IPG Kampus Darulaman <br className="md:hidden" />
                        <span className="hidden md:inline"> | </span>
                        Disediakan oleh Haniff Faizal Bin Chek Ani (KeraBerok)
                    </p>
                </div>
            );

            if (view === 'login') {
                return (
                    <div className="flex-grow flex flex-col items-center justify-center p-4">
                        <div className="bg-white neo-border neo-shadow max-w-md w-full p-8 relative mt-10">
                            <div className="absolute -top-4 -left-4 w-16 h-8 bg-[#ccff00] neo-border rotate-[-10deg]"></div>
                            <h1 className="font-oswald text-4xl mb-2 leading-tight">MPU3421<br/>PELAJAR</h1>
                            <p className="text-gray-600 mb-8 font-medium">Sistem Pemilihan Kokurikulum Permainan.</p>
                            
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="block font-oswald text-lg font-bold mb-2">NO KAD PENGENALAN</label>
                                    <input type="text" placeholder="Contoh: 010203011234" value={noKp} onChange={(e) => setNoKp(e.target.value)} className="w-full p-4 neo-input text-lg font-bold placeholder-gray-400" />
                                </div>
                                {error && (
                                    <div className="bg-[#ff3366] text-white p-3 neo-border text-sm font-bold flex items-center gap-2">
                                        <i className="ph ph-warning-circle text-xl"></i> {error}
                                    </div>
                                )}
                                <button type="submit" disabled={loading} className="w-full bg-[#ccff00] py-4 neo-border neo-shadow neo-shadow-active font-oswald text-2xl font-bold flex items-center justify-center gap-2">
                                    {loading ? <span className="loader"></span> : "LOG MASUK"}
                                    {!loading && <i className="ph ph-arrow-right text-2xl"></i>}
                                </button>
                            </form>
                        </div>
                        <div className="mt-auto"><CopyrightFooter /></div>
                    </div>
                );
            }

            if (view === 'selection') {
                return (
                    <div className="max-w-4xl mx-auto w-full p-4 pb-48">
                        <div className="bg-[#1a1a1a] text-white neo-border p-6 mb-4 mt-4 flex flex-col md:flex-row md:items-center justify-between gap-4 relative overflow-hidden">
                            <div className="flex flex-row items-center gap-4 relative z-10">
                                {student.gambar ? (
                                    <div className="w-20 h-20 md:w-24 md:h-24 bg-white neo-border flex-shrink-0 overflow-hidden neo-shadow">
                                        <img 
                                            src={getDirectImageUrl(student.gambar)} 
                                            alt="Profil Pelajar" 
                                            className="w-full h-full object-cover"
                                            onError={(e) => { 
                                                e.target.onerror = null; 
                                                e.target.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(student.nama) + '&background=ccff00&color=000&bold=true&size=128'; 
                                            }}
                                        />
                                    </div>
                                ) : (
                                    <div className="w-20 h-20 md:w-24 md:h-24 bg-[#ccff00] text-black neo-border flex-shrink-0 overflow-hidden neo-shadow flex items-center justify-center">
                                        <i className="ph-fill ph-user text-4xl md:text-5xl"></i>
                                    </div>
                                )}
                                
                                <div>
                                    <p className="text-[#ccff00] font-oswald text-sm tracking-widest mb-1">PROFIL ATLET</p>
                                    <h2 className="font-oswald text-xl sm:text-2xl md:text-3xl leading-tight">{student.nama}</h2>
                                </div>
                            </div>
                            <div className="bg-white text-black px-4 py-2 neo-border inline-block font-bold relative z-10 whitespace-nowrap self-start md:self-auto">
                                KELAS: <span className="text-[#00e5ff] mr-4">{student.kelas}</span>
                                JANTINA: <span className="text-[#ff3366]">{student.jantina}</span>
                            </div>
                        </div>

                        <div className="bg-white neo-border p-4 md:p-6 mb-8 neo-shadow">
                            <div className="flex items-center gap-2 mb-4 border-b-4 border-black pb-2">
                                <i className="ph-fill ph-chart-bar text-2xl"></i>
                                <h3 className="font-oswald text-xl font-bold">DASHBOARD KEKOSONGAN (PILIHAN 1)</h3>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                {sports.map((s, idx) => (
                                    <div key={`dash-${idx}`} className={`p-2 neo-border flex justify-between items-center ${s.baki > 0 ? 'bg-[#ccff00]' : 'bg-[#ff3366] text-white'}`}>
                                        <div className="flex flex-col mr-2 truncate">
                                            <span className="font-bold text-sm truncate" title={s.permainan}>{s.permainan}</span>
                                            <span className="text-[10px] uppercase font-bold opacity-75 truncate" title={s.pensyarah}>{s.pensyarah}</span>
                                        </div>
                                        <span className="bg-black text-white px-2 py-1 font-oswald text-sm neo-border flex-shrink-0">{s.baki}</span>
                                    </div>
                                ))}
                            </div>
                            <p className="text-xs font-bold text-gray-500 mt-3">* Pilihan 2 dan Pilihan 3 tidak tertakluk kepada baki kuota ini.</p>
                        </div>

                        {error && (
                            <div className="bg-[#ff3366] text-white p-4 neo-border neo-shadow mb-8 font-bold flex items-start gap-3">
                                <i className="ph ph-warning-circle text-3xl"></i> 
                                <span className="text-lg leading-tight">{error}</span>
                            </div>
                        )}

                        <div className="space-y-12">
                            <section>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="bg-[#ccff00] h-10 w-10 flex items-center justify-center neo-border font-oswald text-xl font-bold">1</div>
                                    <h3 className="font-oswald text-2xl">PILIHAN UTAMA</h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {sports.map((s, idx) => {
                                        const disabled = s.koutaPenuh || isSelectedElseWhere(s.permainan, 1);
                                        return (
                                            <label key={`p1-${idx}`} className="cursor-pointer relative block">
                                                <input type="radio" name="pilihan1" value={s.permainan} checked={pilihan1 === s.permainan} onChange={() => setPilihan1(s.permainan)} disabled={disabled} className="peer sr-only radio-custom" />
                                                <div className={`bg-white p-4 neo-border text-center h-full flex flex-col justify-center items-center gap-1 ${disabled ? '' : 'neo-shadow hover:-translate-y-1 hover:-translate-x-1'} transition-all`}>
                                                    <span className="text-lg font-bold">{s.permainan}</span>
                                                    <div className="w-full border-t border-gray-300 my-1"></div>
                                                    <span className="text-[11px] text-gray-600 font-bold uppercase">{s.pensyarah}</span>
                                                    {s.koutaPenuh && (<span className="text-[10px] bg-red-100 border border-red-600 text-red-600 px-2 py-1 uppercase tracking-wider font-oswald mt-2">Kuota Penuh</span>)}
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="bg-white h-10 w-10 flex items-center justify-center neo-border font-oswald text-xl font-bold">2</div>
                                    <h3 className="font-oswald text-2xl">PILIHAN KEDUA</h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {sports.map((s, idx) => {
                                        const disabled = isSelectedElseWhere(s.permainan, 2);
                                        return (
                                            <label key={`p2-${idx}`} className="cursor-pointer relative block">
                                                <input type="radio" name="pilihan2" value={s.permainan} checked={pilihan2 === s.permainan} onChange={() => setPilihan2(s.permainan)} disabled={disabled} className="peer sr-only radio-custom" />
                                                <div className={`bg-white p-4 neo-border text-center h-full flex flex-col justify-center items-center gap-1 ${disabled ? '' : 'neo-shadow hover:-translate-y-1 hover:-translate-x-1'} transition-all`}>
                                                    <span className="text-lg font-bold">{s.permainan}</span>
                                                    <div className="w-full border-t border-gray-300 my-1"></div>
                                                    <span className="text-[11px] text-gray-600 font-bold uppercase">{s.pensyarah}</span>
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="bg-white h-10 w-10 flex items-center justify-center neo-border font-oswald text-xl font-bold">3</div>
                                    <h3 className="font-oswald text-2xl">PILIHAN KETIGA</h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {sports.map((s, idx) => {
                                        const disabled = isSelectedElseWhere(s.permainan, 3);
                                        return (
                                            <label key={`p3-${idx}`} className="cursor-pointer relative block">
                                                <input type="radio" name="pilihan3" value={s.permainan} checked={pilihan3 === s.permainan} onChange={() => setPilihan3(s.permainan)} disabled={disabled} className="peer sr-only radio-custom" />
                                                <div className={`bg-white p-4 neo-border text-center h-full flex flex-col justify-center items-center gap-1 ${disabled ? '' : 'neo-shadow hover:-translate-y-1 hover:-translate-x-1'} transition-all`}>
                                                    <span className="text-lg font-bold">{s.permainan}</span>
                                                    <div className="w-full border-t border-gray-300 my-1"></div>
                                                    <span className="text-[11px] text-gray-600 font-bold uppercase">{s.pensyarah}</span>
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </section>
                        </div>

                        <div className="fixed bottom-0 left-0 right-0 bg-[#f4f4f0]/95 backdrop-blur-md border-t-4 border-black z-50 flex flex-col items-center">
                            <div className="p-4 max-w-4xl w-full flex items-center justify-between gap-4">
                                <button 
                                    onClick={handleReset}
                                    className="px-4 py-3 bg-[#ff3366] text-white neo-border font-oswald font-bold neo-shadow neo-shadow-active flex items-center gap-2"
                                >
                                    <i className="ph-bold ph-arrow-counter-clockwise text-xl"></i>
                                    <span className="hidden sm:inline">RESET</span>
                                </button>
                                
                                <div className="hidden md:block font-bold">
                                    Status: { (pilihan1 && pilihan2 && pilihan3) ? <span className="bg-black text-[#ccff00] px-3 py-1 font-oswald tracking-widest text-sm neo-border">SEDIA DIHANTAR</span> : <span className="bg-white px-3 py-1 neo-border text-red-500 font-oswald">MENUNGGU PILIHAN</span> }
                                </div>

                                <button 
                                    onClick={handleSubmit}
                                    disabled={loading || !pilihan1 || !pilihan2 || !pilihan3}
                                    className={`flex-grow sm:flex-grow-0 px-8 py-3 neo-border font-oswald text-xl font-bold flex items-center justify-center gap-2 ${(!pilihan1 || !pilihan2 || !pilihan3) ? 'bg-gray-300 text-gray-500 opacity-50 cursor-not-allowed' : 'bg-[#00e5ff] text-black neo-shadow neo-shadow-active'}`}
                                >
                                    {loading ? <span className="loader"></span> : "HANTAR REKOD"}
                                    {!loading && <i className="ph ph-paper-plane-right text-2xl"></i>}
                                </button>
                            </div>
                            <div className="w-full bg-white border-t-4 border-black p-1 pb-2">
                                <CopyrightFooter />
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'dashboard_pelajar') {
                return (
                    <div className="flex-grow flex flex-col items-center justify-start p-4 pt-10 pb-24">
                        <div className="bg-[#ccff00] neo-border neo-shadow max-w-3xl w-full p-6 md:p-10 relative mt-10">
                            <div className="absolute top-[-20px] right-[-20px] text-black/10 pointer-events-none">
                                <i className="ph-fill ph-users-three text-[150px]"></i>
                            </div>
                            
                            <h1 className="font-oswald text-4xl md:text-5xl mb-2 relative z-10 text-black">
                                PROFIL ATLET
                            </h1>
                            <p className="text-lg font-bold mb-6 relative z-10 text-black">
                                Selamat kembali, {student.nama}. Tahniah anda telah rekod pilihan anda telah disahkan berdasarkan pilihan anda.
                            </p>
                            
                            <div className="space-y-4 relative z-10">
                                {/* HANYA PAPARKAN PILIHAN 1 SAHAJA */}
                                {[
                                    { label: "PILIHAN UTAMA (1) - RAKAN SEPASUKAN", sport: pilihan1 }
                                ].map((item, idx) => (
                                    <div key={idx} className="bg-white p-6 neo-border flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div>
                                            <p className="text-xs text-gray-500 font-bold uppercase tracking-widest">{item.label}</p>
                                            <p className="text-2xl font-bold mt-1">{item.sport}</p>
                                        </div>
                                        
                                        <button 
                                            onClick={() => fetchMembers(item.sport)}
                                            className="bg-black text-[#ccff00] px-6 py-4 font-oswald text-lg neo-border flex items-center justify-center gap-2 hover:-translate-y-1 hover:-translate-x-1 hover:shadow-[4px_4px_0px_0px_rgba(204,255,0,1)] transition-all flex-shrink-0"
                                        >
                                            <i className="ph-bold ph-users text-2xl"></i> LIHAT SENARAI
                                        </button>
                                        
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-8 text-center relative z-10 border-t-4 border-black pt-6">
                                <button onClick={() => window.location.reload()} className="bg-white px-8 py-3 neo-border font-oswald font-bold neo-shadow neo-shadow-active text-xl flex items-center justify-center gap-2 mx-auto">
                                    <i className="ph-bold ph-sign-out"></i> LOG KELUAR
                                </button>
                            </div>
                        </div>

                        {}
                        {/* MODAL (POPUP) SENARAI NAMA */}
                        {viewMembersSport && (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white max-w-xl w-full neo-border neo-shadow flex flex-col max-h-[85vh]">
                                    <div className="bg-black text-[#ccff00] p-4 flex justify-between items-center neo-border border-b-4 border-l-0 border-r-0 border-t-0">
                                        <div>
                                            <p className="font-oswald text-sm tracking-widest opacity-80">SENARAI PELAJAR (PILIHAN 1)</p>
                                            <h2 className="font-oswald text-2xl">{viewMembersSport}</h2>
                                        </div>
                                        <button onClick={closeMembersModal} className="bg-[#ff3366] text-white w-10 h-10 neo-border flex items-center justify-center hover:scale-110 transition-transform">
                                            <i className="ph-bold ph-x text-xl"></i>
                                        </button>
                                    </div>
                                    
                                    <div className="p-4 overflow-y-auto">
                                        {loadingMembers ? (
                                            <div className="flex flex-col items-center justify-center py-10">
                                                <span className="loader mb-4"></span>
                                                <p className="font-bold">Mencari rekod atlet...</p>
                                            </div>
                                        ) : (
                                            membersList.length > 0 ? (
                                                <ul className="space-y-2">
                                                    {membersList.map((m, i) => (
                                                        <li key={i} className="p-3 border-2 border-black flex justify-between items-center bg-[#f4f4f0] hover:bg-white transition-colors">
                                                            <div className="flex items-center gap-3">
                                                                <div className="bg-[#ccff00] w-8 h-8 flex items-center justify-center border-2 border-black font-oswald font-bold flex-shrink-0">{i+1}</div>
                                                                <div>
                                                                    <p className="font-bold text-sm leading-tight uppercase">{m.nama}</p>
                                                                    <p className="text-[10px] uppercase font-bold text-gray-500 mt-1">{m.kelas}</p>
                                                                </div>
                                                            </div>
                                                            <span className={`px-2 py-1 text-[10px] font-bold border-2 border-black flex-shrink-0 ${m.jantina === 'L' ? 'bg-[#00e5ff]' : 'bg-[#ff3366] text-white'}`}>
                                                                {m.jantina === 'L' ? 'LELAKI' : 'PEREMPUAN'}
                                                            </span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            ) : (
                                                <div className="text-center py-10">
                                                    <i className="ph-fill ph-empty text-5xl text-gray-400 mb-2"></i>
                                                    <p className="font-bold text-gray-500">Belum ada pelajar di dalam senarai ini.</p>
                                                </div>
                                            )
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        <div className="mt-auto w-full"><CopyrightFooter /></div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
