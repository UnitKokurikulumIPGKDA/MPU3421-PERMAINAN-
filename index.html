<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemilihan Sukan Kokurikulum | Zon Atlet</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* NEUBRUTALISM STYLES */
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f4f4f0;
            color: #111;
            background-image: radial-gradient(#d5d5d0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .font-oswald {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        .neo-border {
            border: 4px solid #000;
        }

        .neo-shadow {
            box-shadow: 6px 6px 0px #000;
            transition: all 0.2s ease;
        }

        .neo-shadow:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000;
        }

        .neo-shadow-active:active {
            transform: translate(6px, 6px) !important;
            box-shadow: 0px 0px 0px #000 !important;
        }

        .neo-input {
            border: 4px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s ease;
        }

        .neo-input:focus {
            outline: none;
            box-shadow: 0px 0px 0px #000;
            transform: translate(4px, 4px);
        }

        /* Marquee Animation */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 4px solid black;
            border-top: 4px solid black;
            background-color: #ccff00;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .radio-custom:checked + div {
            background-color: #000;
            color: #fff;
        }
        
        .radio-custom:disabled + div {
            opacity: 0.4;
            background-color: #e5e7eb;
            color: #9ca3af;
            border-color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <!-- Marquee Header -->
    <div class="marquee-container py-2 text-xl font-oswald font-bold tracking-widest text-black">
        <div class="marquee-content">
            PEMILIHAN SUKAN 2026 /// PILIH SUKAN ANDA /// BERTINDAK SEGERA /// KUOTA TERHAD /// PEMILIHAN SUKAN 2026 /// PILIH SUKAN ANDA /// BERTINDAK SEGERA /// KUOTA TERHAD /// PEMILIHAN SUKAN 2026 /// PILIH SUKAN ANDA /// BERTINDAK SEGERA /// KUOTA TERHAD ///
        </div>
    </div>

    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        // --- MASUKKAN WEB APP URL ANDA DI SINI ---
        const API_URL = "https://script.google.com/macros/s/AKfycbz-72ijRhwX10Gr1k8SbdH7UNvsEqZeIzuki16o68yBoNTylEN-GWPJa6GxhMJwF1hI-A/exec";

        const App = () => {
            const [view, setView] = React.useState('login'); // 'login', 'selection', 'success'
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            
            const [noKp, setNoKp] = React.useState('');
            const [student, setStudent] = React.useState(null);
            const [sports, setSports] = React.useState([]);
            
            const [pilihan1, setPilihan1] = React.useState('');
            const [pilihan2, setPilihan2] = React.useState('');
            const [pilihan3, setPilihan3] = React.useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!noKp) return;
                
                setLoading(true);
                setError('');
                
                try {
                    const res = await fetch(`${API_URL}?action=login&no_kp=${noKp}`);
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        setStudent(data.data);
                        fetchSports(data.data.jantina);
                    } else {
                        setError(data.message);
                        setLoading(false);
                    }
                } catch (err) {
                    setError("Ralat sambungan ke pelayan.");
                    setLoading(false);
                }
            };

            const fetchSports = async (jantina) => {
                try {
                    const res = await fetch(`${API_URL}?action=getSports&jantina=${jantina}`);
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        setSports(data.data);
                        setView('selection');
                    } else {
                        setError("Gagal memuat turun senarai sukan.");
                    }
                } catch (err) {
                    setError("Ralat semasa mengambil senarai sukan.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmit = async () => {
                if (!pilihan1 || !pilihan2 || !pilihan3) {
                    setError("Sila lengkapkan ketiga-tiga pilihan sukan anda.");
                    return;
                }
                
                setLoading(true);
                setError('');
                
                try {
                    const payload = {
                        no_kp: student.no_kp,
                        pilihan1: pilihan1,
                        pilihan2: pilihan2,
                        pilihan3: pilihan3
                    };

                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        setView('success');
                    } else {
                        setError(data.message);
                    }
                } catch (err) {
                    setError("Gagal menghantar data. Sila cuba lagi.");
                } finally {
                    setLoading(false);
                }
            };

            // Helpers for Option Filtering
            const isSelectedElseWhere = (sportName, currentChoice) => {
                if (currentChoice !== 1 && pilihan1 === sportName) return true;
                if (currentChoice !== 2 && pilihan2 === sportName) return true;
                if (currentChoice !== 3 && pilihan3 === sportName) return true;
                return false;
            };

            if (view === 'login') {
                return (
                    <div className="flex-grow flex items-center justify-center p-4">
                        <div className="bg-white neo-border neo-shadow max-w-md w-full p-8 relative">
                            {/* Decorative Tape */}
                            <div className="absolute -top-4 -left-4 w-16 h-8 bg-[#ccff00] neo-border rotate-[-10deg]"></div>
                            
                            <h1 className="font-oswald text-4xl mb-2 leading-tight">ZON<br/>ATLET</h1>
                            <p className="text-gray-600 mb-8 font-medium">Sistem Pemilihan Sukan Kokurikulum Rasmi.</p>
                            
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="block font-oswald text-lg font-bold mb-2">NO KAD PENGENALAN</label>
                                    <input 
                                        type="text" 
                                        placeholder="Contoh: 010203011234"
                                        value={noKp}
                                        onChange={(e) => setNoKp(e.target.value)}
                                        className="w-full p-4 neo-input text-lg font-bold placeholder-gray-400"
                                    />
                                </div>
                                
                                {error && (
                                    <div className="bg-[#ff3366] text-white p-3 neo-border text-sm font-bold flex items-center gap-2">
                                        <i className="ph ph-warning-circle text-xl"></i> {error}
                                    </div>
                                )}
                                
                                <button 
                                    type="submit" 
                                    disabled={loading}
                                    className="w-full bg-[#ccff00] py-4 neo-border neo-shadow neo-shadow-active font-oswald text-2xl font-bold flex items-center justify-center gap-2"
                                >
                                    {loading ? <span className="loader"></span> : "TERUSKAN"}
                                    {!loading && <i className="ph ph-arrow-right text-2xl"></i>}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'selection') {
                return (
                    <div className="max-w-4xl mx-auto w-full p-4 pb-24">
                        {/* Header ID Card */}
                        <div className="bg-[#1a1a1a] text-white neo-border p-6 mb-8 mt-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <p className="text-[#ccff00] font-oswald text-sm tracking-widest mb-1">PROFIL ATLET</p>
                                <h2 className="font-oswald text-3xl">{student.nama}</h2>
                            </div>
                            <div className="bg-white text-black px-4 py-2 neo-border inline-block font-bold">
                                JANTINA: <span className="text-[#ff3366]">{student.jantina === 'L' ? 'LELAKI' : 'PEREMPUAN'}</span>
                            </div>
                        </div>

                        {error && (
                            <div className="bg-[#ff3366] text-white p-4 neo-border neo-shadow mb-8 font-bold flex items-center gap-2">
                                <i className="ph ph-warning-circle text-2xl"></i> {error}
                            </div>
                        )}

                        <div className="space-y-12">
                            {/* PILIHAN 1 (Tertakluk kepada kuota) */}
                            <section>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="bg-[#ccff00] h-10 w-10 flex items-center justify-center neo-border font-oswald text-xl font-bold">1</div>
                                    <h3 className="font-oswald text-2xl">PILIHAN UTAMA <span className="text-sm bg-black text-[#ccff00] px-2 py-1 ml-2 align-middle">KUOTA AKTIF</span></h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {sports.map((s, idx) => {
                                        const disabled = s.koutaPenuh || isSelectedElseWhere(s.permainan, 1);
                                        return (
                                            <label key={`p1-${idx}`} className="cursor-pointer relative block">
                                                <input 
                                                    type="radio" 
                                                    name="pilihan1" 
                                                    value={s.permainan}
                                                    checked={pilihan1 === s.permainan}
                                                    onChange={() => setPilihan1(s.permainan)}
                                                    disabled={disabled}
                                                    className="peer sr-only radio-custom"
                                                />
                                                <div className={`bg-white p-4 neo-border font-bold text-center h-full flex flex-col justify-center gap-2 ${disabled ? '' : 'neo-shadow hover:-translate-y-1 hover:-translate-x-1'} transition-all`}>
                                                    <span className="text-lg">{s.permainan}</span>
                                                    {s.koutaPenuh && <span className="text-[10px] bg-red-100 text-red-600 px-2 py-1 uppercase tracking-wider">Kuota Penuh</span>}
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </section>

                            {/* PILIHAN 2 (Semua sukan jantina, tolak pilihan lain) */}
                            <section>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="bg-white h-10 w-10 flex items-center justify-center neo-border font-oswald text-xl font-bold">2</div>
                                    <h3 className="font-oswald text-2xl">PILIHAN KEDUA</h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {sports.map((s, idx) => {
                                        const disabled = isSelectedElseWhere(s.permainan, 2);
                                        return (
                                            <label key={`p2-${idx}`} className="cursor-pointer relative block">
                                                <input 
                                                    type="radio" 
                                                    name="pilihan2" 
                                                    value={s.permainan}
                                                    checked={pilihan2 === s.permainan}
                                                    onChange={() => setPilihan2(s.permainan)}
                                                    disabled={disabled}
                                                    className="peer sr-only radio-custom"
                                                />
                                                <div className={`bg-white p-4 neo-border font-bold text-center h-full flex flex-col justify-center gap-2 ${disabled ? '' : 'neo-shadow hover:-translate-y-1 hover:-translate-x-1'} transition-all`}>
                                                    <span className="text-lg">{s.permainan}</span>
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </section>

                            {/* PILIHAN 3 (Semua sukan jantina, tolak pilihan lain) */}
                            <section>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="bg-white h-10 w-10 flex items-center justify-center neo-border font-oswald text-xl font-bold">3</div>
                                    <h3 className="font-oswald text-2xl">PILIHAN KETIGA</h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {sports.map((s, idx) => {
                                        const disabled = isSelectedElseWhere(s.permainan, 3);
                                        return (
                                            <label key={`p3-${idx}`} className="cursor-pointer relative block">
                                                <input 
                                                    type="radio" 
                                                    name="pilihan3" 
                                                    value={s.permainan}
                                                    checked={pilihan3 === s.permainan}
                                                    onChange={() => setPilihan3(s.permainan)}
                                                    disabled={disabled}
                                                    className="peer sr-only radio-custom"
                                                />
                                                <div className={`bg-white p-4 neo-border font-bold text-center h-full flex flex-col justify-center gap-2 ${disabled ? '' : 'neo-shadow hover:-translate-y-1 hover:-translate-x-1'} transition-all`}>
                                                    <span className="text-lg">{s.permainan}</span>
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </section>
                        </div>

                        {/* Submit Button Sticky Area */}
                        <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm border-t-4 border-black p-4 z-50 flex justify-center">
                            <div className="max-w-4xl w-full flex items-center justify-between">
                                <div className="hidden md:block font-bold">
                                    Status: { (pilihan1 && pilihan2 && pilihan3) ? <span className="text-green-600">Lengkap</span> : <span className="text-red-500">Belum Lengkap</span> }
                                </div>
                                <button 
                                    onClick={handleSubmit}
                                    disabled={loading || !pilihan1 || !pilihan2 || !pilihan3}
                                    className={`px-8 py-3 neo-border font-oswald text-xl font-bold flex items-center gap-2 ${(!pilihan1 || !pilihan2 || !pilihan3) ? 'bg-gray-300 text-gray-500 opacity-50 cursor-not-allowed' : 'bg-[#00e5ff] text-black neo-shadow neo-shadow-active'}`}
                                >
                                    {loading ? <span className="loader"></span> : "HANTAR PILIHAN"}
                                    {!loading && <i className="ph ph-check-fat text-2xl"></i>}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'success') {
                return (
                    <div className="flex-grow flex items-center justify-center p-4">
                        <div className="bg-[#ccff00] neo-border neo-shadow max-w-lg w-full p-10 text-center relative overflow-hidden">
                            <div className="absolute top-[-50px] right-[-50px] text-black/10">
                                <i className="ph-fill ph-trophy text-[200px]"></i>
                            </div>
                            <h1 className="font-oswald text-6xl mb-4 relative z-10">SELESAI!</h1>
                            <p className="text-xl font-bold mb-6 relative z-10">Pilihan sukan anda telah berjaya direkodkan.</p>
                            
                            <div className="bg-white p-4 neo-border inline-block relative z-10 text-left mb-8">
                                <p><strong>PILIHAN 1:</strong> {pilihan1}</p>
                                <p><strong>PILIHAN 2:</strong> {pilihan2}</p>
                                <p><strong>PILIHAN 3:</strong> {pilihan3}</p>
                            </div>
                            
                            <p className="text-sm font-bold relative z-10">Anda boleh menutup tetingkap ini.</p>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
